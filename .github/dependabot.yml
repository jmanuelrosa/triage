version: 2
updates:
  # SwiftPM packages — currently Yams + swift-testing.
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "swift"
    commit-message:
      prefix: "deps"
    groups:
      # One PR per week for all minor/patch updates rather than one PR per
      # package. Major bumps still get their own PR for review.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
