version: 2
updates:
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    # Disable version update PRs
    # Security alerts will still be created automatically
    open-pull-requests-limit: 0
    groups:
      development-dependencies:
        dependency-type: development
        minor-and-patch:
          update-types:
            - "minor"
            - "patch"
    labels:
      - "dependencies"
      - "swift"
    commit-message:
      prefix: chore
      include: scope

  # npm
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    # Disable version update PRs
    # Security alerts will still be created automatically
    open-pull-requests-limit: 0
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # Pin @types/node to match .nvmrc major version
      - dependency-name: "@types/node"
        versions: [">= 25"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
    commit-message:
      prefix: ci