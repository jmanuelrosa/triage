name: Deploy landing to GitHub Pages

# Analytics (Umami) is opt-in via a GitHub repository variable:
#   Repo → Settings → Secrets and variables → Actions → Variables
#     UMAMI_WEBSITE_ID   (required to enable; the UUID from your Umami dashboard)
# When UMAMI_WEBSITE_ID is unset the script tag is omitted entirely.
# This is a *variable*, not a secret — the ID is exposed in the HTML by design.
# The script URL is hardcoded to https://cloud.umami.is/script.js.
#
# For local builds, create a .env file inside web/ with PUBLIC_UMAMI_WEBSITE_ID=...
# .env is gitignored.

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Astro 6 requires Node 22+. The Ubuntu runner ships Node 20 by default,
      # and `astro build` executes under Node (not bun), even though bun is
      # the package manager. Pin Node explicitly so the toolchain matches
      # local dev and the CI web-check job.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.13'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./web
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: ./web
        env:
          PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
