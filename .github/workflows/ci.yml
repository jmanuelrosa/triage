name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same PR / branch. Keying on PR number (when
# present) keeps a push-to-main from cancelling the PR run that produced it.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which areas of the repo changed so we only spin up macos-14 when
  # Swift code is touched. A job skipped via `if:` reports as success to
  # branch protection, so required checks still resolve on docs/web-only PRs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'Sources/**'
              - 'Tests/**'
              - 'Resources/**'
              - 'Scripts/**'
              - 'Package.swift'
              - 'Package.resolved'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'

  test:
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: swift test --enable-test-discovery

      - name: Build .app bundle (release config, native arch)
        # Smoke-checks Scripts/build.sh on every PR so a broken release
        # pipeline doesn't first surface at tag-push time.
        run: ./Scripts/build.sh release

      - name: Verify binary launches
        run: |
          # Sanity-check that codesign + bundle layout produced a runnable binary.
          # We can't actually exercise the menu bar / Apple Events on a runner,
          # but we can at least confirm the binary loads. The binary has no
          # --help flag and will start the event loop and hang, so cap it.
          timeout 5 ./Triage.app/Contents/MacOS/triage --help 2>&1 || true
          file Triage.app/Contents/MacOS/triage
          codesign --verify --verbose Triage.app

  web-check:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Astro 6 requires Node 22+. The Ubuntu runner ships Node 20 by default,
      # and `astro check` / `astro build` execute under Node (not bun), even
      # though bun is the package manager. Pin Node 22 explicitly so the
      # toolchain matches local dev.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./web
        run: bun install --frozen-lockfile

      - name: Type-check (astro check)
        working-directory: ./web
        run: bun run check

      - name: Build site
        working-directory: ./web
        run: bun run build

  # Runs on every PR / push regardless of which paths changed — secrets can
  # land in any file. `GITLEAKS_LICENSE` enables the Pro ruleset if set;
  # without it, the action falls back to the OSS rules and still gates.
  secret-scan:
    name: Secret Detection (GitLeaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run GitLeaks secret scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
