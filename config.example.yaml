# Triage — example config
#
# Copy to ~/.config/triage/config.yaml:
#   mkdir -p ~/.config/triage && cp config.example.yaml ~/.config/triage/config.yaml
#
# Reload after edits via the menu bar (or kill & relaunch Triage).
# Match semantics:
#   - First matching rule wins, top-down.
#   - host / path / source_app are independently optional. Missing field = match anything.
#   - host and path support `*` glob (case-insensitive, anchored).
#   - source_app matches against either the bundle ID or the app's display name.
# No `default_browser` field — the silent fallback is whatever the system default
# browser was at Triage's first launch (captured to ~/.config/triage/fallback-browser.json).

browsers:
  helium:
    bundle_id: net.imput.helium                # work / Didomi
  chrome_personal:
    bundle_id: com.google.Chrome
    profile: "Jose Manuel"                     # → Default
  chrome_dev:
    bundle_id: com.google.Chrome
    profile: "Jose Manuel [Dev]"               # → Profile 4
  chrome_3bits:
    bundle_id: com.google.Chrome
    profile: "3bitslost"                       # → Profile 8

rules:
  # Work — anything Didomi-related goes to Helium regardless of source
  - host: "*.didomi.io"
    browser: helium
  - host: "*.addingwell.com"
    browser: helium
  - host: gitlab.com
    path: "/didomi/*"
    browser: helium

  # GitHub orgs — same host, different routing by path
  - host: github.com
    path: "/addingwell/*"
    browser: helium
  - host: github.com
    path: "/3bitslost-team/*"
    browser: chrome_3bits

  # Source-app shortcut: work Slack → work browser, regardless of URL
  - source_app: Slack
    browser: helium
